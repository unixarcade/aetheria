<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetheria | Multi-Modal Consciousness Loom</title>
    <style>
        :root {
            --bg-base: #020204;
            --glass-bg: rgba(12, 12, 16, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8f8f8;
            --text-dim: #7a7a8c;
            
            --theme-color: #8b5cf6; 
            --theme-glow: rgba(139, 92, 246, 0.4);
            
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            
            --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            --font-mono: "SF Mono", "Consolas", monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-ui);
            overflow: hidden;
            touch-action: none;
        }

        /* Ambient Background */
        #ambient-glow {
            position: absolute;
            top: 50%; left: 50%;
            width: 150vw; height: 150vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--theme-glow) 0%, transparent 60%);
            opacity: 0.5;
            transition: all 1.5s ease;
            z-index: 0;
            pointer-events: none;
        }

        /* Visualizer Canvas */
        #loom-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Initiation Gate */
        #init-gate {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(2, 2, 4, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #init-gate.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        .gate-title {
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff, var(--theme-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-initiate {
            background: transparent;
            border: 1px solid var(--theme-color);
            color: var(--theme-color);
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px var(--theme-glow);
        }

        .btn-initiate:active {
            transform: scale(0.95);
            background: var(--theme-color);
            color: #fff;
        }

        /* --- STAGE LAYOUT (Fixes the overlapping issue) --- */
        
        /* The Upper Stage holds the HUD and the Orb. 
           It dynamically resizes so the orb is always perfectly centered in the visible space. */
        #upper-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 48vh; /* When deck is open, orb sits in top 48% of screen */
            padding-top: var(--safe-top);
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
            transition: height 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }

        #upper-stage.expanded {
            height: calc(100% - 60px - var(--safe-bottom)); /* Full screen minus minimized deck handle */
        }

        /* Top HUD */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            pointer-events: auto;
        }

        .stargate-display {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--theme-color);
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 6px 10px;
            border-radius: 8px;
            letter-spacing: 2px;
            backdrop-filter: blur(10px);
            transition: border-color 1s ease, color 1s ease;
        }

        .timer-display {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.8);
        }

        /* Center Breathing Orb */
        #center-focus {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .breath-orb {
            width: 76px; height: 76px;
            border-radius: 50%;
            border: 1px solid var(--theme-color);
            background: radial-gradient(circle at center, rgba(255,255,255,0.1), transparent);
            box-shadow: 0 0 30px var(--theme-glow), inset 0 0 15px var(--theme-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 4s linear, box-shadow 1s ease, border-color 1s ease;
        }

        .breath-orb.paused {
            animation: pulse 4s infinite ease-in-out;
            border: 1px dashed rgba(255,255,255,0.4);
            box-shadow: 0 0 20px rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
        }

        .orb-label {
            position: absolute;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            transition: opacity 0.4s ease;
            pointer-events: none;
            text-align: center;
            width: 140px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.08); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- MODALITY DECK (Controls) --- */
        #modality-deck {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            max-height: 55vh; /* Prevents deck from taking over small screens */
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border);
            border-radius: 28px 28px 0 0;
            pointer-events: auto;
            transform: translateY(0);
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            z-index: 20;
        }

        /* Immersion State (Minimized) */
        #modality-deck.minimized {
            /* Slide down leaving only the drag handle visible */
            transform: translateY(calc(100% - 46px - var(--safe-bottom)));
        }
        
        #modality-deck.minimized .deck-content {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease; /* Fade out quickly when dragging down */
        }

        /* Drag Handle (Expanded hit area for thumb swipe) */
        .deck-handle-area {
            width: 100%;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 30;
            touch-action: none; /* Crucial: stops scroll interference on mobile */
        }

        .handle-pill {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            transition: background 0.3s ease, width 0.3s ease, transform 0.3s ease;
        }

        .deck-handle-area:active .handle-pill {
            background: rgba(255, 255, 255, 0.7);
            width: 50px;
            transform: scaleY(1.5);
        }

        /* Scrollable content area if height is constrained */
        .deck-content {
            padding: 0 24px calc(var(--safe-bottom) + 16px) 24px;
            overflow-y: auto;
            transition: opacity 0.4s ease 0.1s;
            opacity: 1;
        }
        
        /* Hide scrollbar */
        .deck-content::-webkit-scrollbar { display: none; }
        .deck-content { -ms-overflow-style: none; scrollbar-width: none; }

        /* Deck Navigation */
        .deck-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
        }

        .nav-btn {
            background: none; border: none;
            color: var(--text-dim);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 8px 0;
            cursor: pointer;
            transition: color 0.3s ease;
            flex: 1;
            text-align: center;
        }

        .nav-btn.active {
            color: var(--text-main);
            font-weight: 600;
        }

        .nav-indicator {
            position: absolute;
            bottom: 0; left: 0;
            height: 1px;
            background: var(--theme-color);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 8px var(--theme-color);
        }

        /* Deck Panels */
        .panel {
            display: none;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        .panel.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* UI Controls within Panels */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .val-display { color: var(--text-main); font-variant-numeric: tabular-nums; }

        /* Toggle Buttons */
        .btn-group {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 12px 0;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: rgba(255,255,255,0.1);
            color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* Custom Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 24px; 
            margin: 4px 0;
        }

        input[type=range]:focus { outline: none; }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 18px; width: 18px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 12px var(--theme-color);
            -webkit-appearance: none;
            margin-top: -8px;
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.4); }

        /* Minimized Actions Footer */
        .actions-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s;
            opacity: 0.6;
        }

        .action-btn:active { transform: scale(0.95); }
        .action-btn:hover { opacity: 1; color: var(--text-main); }
        .action-btn.support:hover { color: #00d632; }
        .action-btn svg { width: 14px; height: 14px; fill: currentColor; }

        @media (min-width: 768px) {
            #modality-deck {
                left: 50%;
                width: 480px;
                margin-left: -240px;
                border: 1px solid var(--glass-border);
                border-bottom: none;
            }
        }
    </style>
</head>
<body>

    <div id="ambient-glow"></div>
    <canvas id="loom-canvas"></canvas>

    <div id="init-gate">
        <h1 class="gate-title">Aetheria</h1>
        <button class="btn-initiate" id="btn-boot">Initialize</button>
    </div>

    <!-- UPPER STAGE: Dynamically Resizes -->
    <div id="upper-stage">
        <header id="top-hud">
            <div class="stargate-display" id="coord-display">RV: ----</div>
            <div class="timer-display" id="timer-display">--:--</div>
        </header>

        <div id="center-focus">
            <div class="breath-orb paused" id="breath-orb">
                <span class="orb-label" id="orb-label">Tap to Start</span>
            </div>
        </div>
    </div>

    <!-- MODALITY DECK -->
    <div id="modality-deck">
        
        <!-- Expanded Drag Hit Area -->
        <div class="deck-handle-area" id="deck-toggle">
            <div class="handle-pill"></div>
        </div>

        <div class="deck-content">
            <div class="deck-nav">
                <button class="nav-btn active" data-target="panel-audio">Acoustic</button>
                <button class="nav-btn" data-target="panel-prana">Prana</button>
                <button class="nav-btn" data-target="panel-vision">Vision</button>
                <button class="nav-btn" data-target="panel-focus">Focus</button>
                <div class="nav-indicator" id="nav-indicator"></div>
            </div>

            <!-- Panel 1: Acoustic -->
            <div class="panel active" id="panel-audio">
                <div class="control-group">
                    <div class="control-label"><span>Brainwave State</span></div>
                    <div class="btn-group">
                        <button class="toggle-btn wave-btn" data-freq="2" data-color="#1e3a8a">Delta</button>
                        <button class="toggle-btn wave-btn active" data-freq="5" data-color="#8b5cf6">Theta</button>
                        <button class="toggle-btn wave-btn" data-freq="10" data-color="#10b981">Alpha</button>
                        <button class="toggle-btn wave-btn" data-freq="20" data-color="#f59e0b">Beta</button>
                    </div>
                </div>
                <div class="control-group">
                    <div class="control-label"><span>Carrier Frequency</span> <span class="val-display" id="val-carrier">136.1 Hz</span></div>
                    <input type="range" id="slide-carrier" min="60" max="432" value="136.1" step="0.1">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>Volume</span></div>
                    <input type="range" id="slide-volume" min="0" max="100" value="50">
                </div>
            </div>

            <!-- Panel 2: Prana -->
            <div class="panel" id="panel-prana">
                <div class="control-group">
                    <div class="control-label"><span>Breathing Modality</span></div>
                    <div class="btn-group">
                        <button class="toggle-btn prana-btn active" data-pattern="4,4,4,4">Box (Balance)</button>
                        <button class="toggle-btn prana-btn" data-pattern="4,7,8,0">4-7-8 (Relax)</button>
                        <button class="toggle-btn prana-btn" data-pattern="2,0,2,0">2-0-2 (Energy)</button>
                    </div>
                </div>
                <p style="font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 8px; line-height: 1.4;">
                    Follow the central orb. Expanding = Inhale, Contracting = Exhale.
                </p>
            </div>

            <!-- Panel 3: Vision -->
            <div class="panel" id="panel-vision">
                <div class="control-group">
                    <div class="control-label"><span>Geometric Complexity</span></div>
                    <input type="range" id="slide-complexity" min="50" max="400" value="200">
                </div>
                <div class="control-group">
                    <div class="control-label"><span>Motion Velocity</span></div>
                    <input type="range" id="slide-velocity" min="1" max="40" value="8">
                </div>
            </div>

            <!-- Panel 4: Focus -->
            <div class="panel" id="panel-focus">
                <div class="control-group">
                    <div class="control-label"><span>Stargate Coordinate</span></div>
                    <button class="toggle-btn" id="btn-new-coord" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">
                        Acquire New Target
                    </button>
                </div>
                <div class="control-group" style="margin-top: 4px;">
                    <div class="control-label"><span>Session Timer</span></div>
                    <div class="btn-group">
                        <button class="toggle-btn time-btn active" data-time="0">Free</button>
                        <button class="toggle-btn time-btn" data-time="5">5m</button>
                        <button class="toggle-btn time-btn" data-time="15">15m</button>
                        <button class="toggle-btn time-btn" data-time="30">30m</button>
                    </div>
                </div>
            </div>

            <div class="actions-row">
                <a href="https://cash.app/$unixarcade" target="_blank" class="action-btn support">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1.41 16.09V20h-2.67v-1.93c-1.71-.36-3.11-1.36-3.11-2.92v-1.59h2.84v1.27c0 .72.82 1.13 1.53 1.13 1.05 0 1.63-.58 1.63-1.19 0-.96-.83-1.28-2.28-1.72-2.19-.66-3.41-1.61-3.41-3.2 0-1.56 1.25-2.67 2.81-3.02V5h2.67v1.89c1.61.32 2.81 1.29 2.81 2.76v1.44h-2.84V9.8c0-.62-.64-1.04-1.42-1.04-1.01 0-1.5.54-1.5 1.11 0 .91.82 1.21 2.37 1.7 2.19.68 3.32 1.69 3.32 3.23 0 1.61-1.33 2.72-2.76 3.09z"/></svg>
                    Support
                </a>
                <button id="btn-share" class="action-btn">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                    Share
                </button>
            </div>

        </div>
    </div>

    <script>
        const State = {
            isRunning: false,
            audioContextActive: false,
            deckMinimized: false,
            
            carrier: 136.1,
            beat: 5,
            volume: 0.5,
            
            color: '#8b5cf6',
            complexity: 200,
            velocity: 0.008,
            
            pranaPattern: [4, 4, 4, 4], 
            
            sessionTimeRemaining: 0,
            timerInterval: null
        };

        // --- AUDIO ENGINE ---
        class EngineAudio {
            constructor() { this.ctx = null; this.nodes = {}; }
            async initialize() {
                if (this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                if (this.ctx.state === 'suspended') await this.ctx.resume();

                this.nodes.master = this.ctx.createGain();
                this.nodes.master.gain.value = 0;
                this.nodes.master.connect(this.ctx.destination);

                const createChannel = (panValue) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    const pan = this.ctx.createStereoPanner ? this.ctx.createStereoPanner() : this.ctx.createPanner();
                    
                    osc.type = 'sine';
                    if (pan.pan) pan.pan.value = panValue;
                    else { pan.setPosition(panValue, 0, 0); pan.panningModel = 'equalpower'; }
                    
                    osc.connect(gain); gain.connect(pan); pan.connect(this.nodes.master);
                    osc.start(); return { osc, gain };
                };

                this.nodes.left = createChannel(-1);
                this.nodes.right = createChannel(1);
                
                State.audioContextActive = true;
                this.update();
            }
            update() {
                if (!this.ctx) return;
                const now = this.ctx.currentTime;
                this.nodes.left.osc.frequency.setTargetAtTime(State.carrier, now, 0.1);
                this.nodes.right.osc.frequency.setTargetAtTime(State.carrier + State.beat, now, 0.1);
            }
            setVolume(val) {
                State.volume = val;
                if (!this.ctx || !State.isRunning) return;
                this.nodes.master.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1);
            }
            toggle(active) {
                if (!this.ctx) return;
                this.nodes.master.gain.setTargetAtTime(active ? State.volume : 0, this.ctx.currentTime, 0.8);
            }
        }
        const Audio = new EngineAudio();

        // --- VISUAL ENGINE ---
        class EngineVisual {
            constructor() {
                this.canvas = document.getElementById('loom-canvas');
                this.ctx = this.canvas.getContext('2d', { alpha: true });
                this.time = 0;
                window.addEventListener('resize', () => this.resize());
                this.resize();
                this.render = this.render.bind(this);
                requestAnimationFrame(this.render);
            }
            resize() {
                const dpr = window.devicePixelRatio || 1;
                this.w = window.innerWidth;
                this.h = window.innerHeight;
                this.canvas.width = this.w * dpr;
                this.canvas.height = this.h * dpr;
                this.ctx.scale(dpr, dpr);
            }
            updateThemeColor(hex) {
                State.color = hex;
                document.documentElement.style.setProperty('--theme-color', hex);
                const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                document.documentElement.style.setProperty('--theme-glow', `rgba(${r}, ${g}, ${b}, 0.4)`);
            }
            render() {
                this.ctx.globalCompositeOperation = 'destination-out';
                this.ctx.fillStyle = `rgba(0, 0, 0, ${State.isRunning ? '0.08' : '0.15'})`;
                this.ctx.fillRect(0, 0, this.w, this.h);
                
                this.ctx.globalCompositeOperation = 'source-over';
                this.time += State.isRunning ? State.velocity : (State.velocity * 0.2);
                
                const cx = this.w / 2;
                const cy = (this.h / 2); // Perfectly center visualizer on full screen
                const maxR = Math.min(this.w, this.h) * 0.42;
                
                this.ctx.beginPath();
                this.ctx.globalAlpha = State.isRunning ? 1.0 : 0.2;
                this.ctx.strokeStyle = State.color;
                this.ctx.lineWidth = 1.5;

                const f1 = (State.carrier / 100);
                const f2 = f1 + (State.beat / 10);
                const phase = this.time;
                const iters = State.complexity;

                for (let i = 0; i < iters; i++) {
                    const t = i * 0.05 + this.time;
                    const damp = Math.pow(0.999, i);
                    const x = cx + maxR * damp * (Math.sin(t * f1 + phase) * Math.cos(t * f2));
                    const y = cy + maxR * damp * (Math.sin(t * f2) * Math.cos(t * f1 - phase));
                    
                    if (i === 0) this.ctx.moveTo(x, y);
                    else this.ctx.lineTo(x, y);
                }
                this.ctx.stroke();
                this.ctx.globalAlpha = 1.0; 
                
                requestAnimationFrame(this.render);
            }
        }
        const Visual = new EngineVisual();

        // --- PRANA ENGINE ---
        class EnginePrana {
            constructor() {
                this.orb = document.getElementById('breath-orb');
                this.label = document.getElementById('orb-label');
                this.timeoutId = null;
                this.phaseIndex = 0;
            }
            toggle(active) {
                clearTimeout(this.timeoutId);
                this.orb.style.transition = 'none'; 
                if (active) {
                    this.orb.classList.remove('paused');
                    this.phaseIndex = 0;
                    this.runPhase();
                } else {
                    this.orb.classList.add('paused');
                    this.orb.style.transform = 'scale(1)';
                    this.label.innerText = 'Tap to Resume';
                    this.label.style.opacity = 1;
                }
            }
            runPhase() {
                if (!State.isRunning) return;
                const phases = ['Inhale', 'Hold', 'Exhale', 'Hold'];
                const scales = [2.2, 2.2, 0.7, 0.7]; 
                
                let currentDuration = State.pranaPattern[this.phaseIndex] * 1000;
                if (currentDuration === 0 && State.pranaPattern.every(v => v === 0)) currentDuration = 1000;

                if (currentDuration > 0) {
                    this.label.innerText = phases[this.phaseIndex];
                    this.orb.style.transition = `transform ${currentDuration}ms linear, box-shadow 1s ease`;
                    void this.orb.offsetWidth; 
                    this.orb.style.transform = `scale(${scales[this.phaseIndex]})`;
                }

                let loops = 0;
                do {
                    this.phaseIndex = (this.phaseIndex + 1) % 4;
                    loops++;
                } while (State.pranaPattern[this.phaseIndex] === 0 && loops < 4);

                this.timeoutId = setTimeout(() => this.runPhase(), Math.max(currentDuration, 50));
            }
        }
        const Prana = new EnginePrana();

        // --- UI CONTROLLER & TOUCH PHYSICS ---
        class EngineUI {
            init() {
                this.bindBoot();
                this.bindDeckSwipeAndToggle();
                this.bindNavigation();
                this.bindAudioControls();
                this.bindPranaControls();
                this.bindVisualControls();
                this.bindFocusControls();
                this.bindOrbToggle();
                this.generateCoordinate();
            }

            bindBoot() {
                document.getElementById('btn-boot').addEventListener('click', async () => {
                    await Audio.initialize(); 
                    document.getElementById('init-gate').classList.add('hidden');
                });
            }

            bindDeckSwipeAndToggle() {
                const deck = document.getElementById('modality-deck');
                const handleArea = document.getElementById('deck-toggle');
                const upperStage = document.getElementById('upper-stage');
                
                const setDeckState = (minimize) => {
                    State.deckMinimized = minimize;
                    deck.style.transition = 'transform 0.5s cubic-bezier(0.32, 0.72, 0, 1)';
                    deck.style.transform = ''; // Clear inline styles so class takes over
                    
                    if (minimize) {
                        deck.classList.add('minimized');
                        upperStage.classList.add('expanded'); // Expands upper half to perfectly center orb
                    } else {
                        deck.classList.remove('minimized');
                        upperStage.classList.remove('expanded');
                    }
                };

                // Tap to Toggle
                handleArea.addEventListener('click', () => setDeckState(!State.deckMinimized));
                
                // Expose
                this.minimizeDeck = () => setDeckState(true);
                this.maximizeDeck = () => setDeckState(false);

                // --- 1:1 Thumb Swipe Physics ---
                let startY = 0;
                let isDragging = false;

                handleArea.addEventListener('touchstart', (e) => {
                    startY = e.touches[0].clientY;
                    isDragging = true;
                    deck.style.transition = 'none'; // Lock to finger
                }, {passive: true});

                handleArea.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;
                    const deltaY = e.touches[0].clientY - startY;

                    if (!State.deckMinimized && deltaY > 0) {
                        // Dragging down from open
                        deck.style.transform = `translateY(${deltaY}px)`;
                    } else if (State.deckMinimized && deltaY < 0) {
                        // Dragging up from closed
                        deck.style.transform = `translateY(calc(100% - 46px - var(--safe-bottom) + ${deltaY}px))`;
                    }
                }, {passive: true});

                handleArea.addEventListener('touchend', (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    const deltaY = e.changedTouches[0].clientY - startY;

                    // Threshold detection (Swipe > 40px triggers state change)
                    if (deltaY > 40 && !State.deckMinimized) {
                        setDeckState(true);
                    } else if (deltaY < -40 && State.deckMinimized) {
                        setDeckState(false);
                    } else {
                        // Snap back if threshold not met
                        setDeckState(State.deckMinimized);
                    }
                });
            }

            bindOrbToggle() {
                document.getElementById('breath-orb').addEventListener('click', () => {
                    if (!State.audioContextActive) return;
                    
                    State.isRunning = !State.isRunning;
                    Audio.toggle(State.isRunning);
                    Prana.toggle(State.isRunning);
                    
                    if (State.isRunning) {
                        this.minimizeDeck();
                        document.getElementById('orb-label').style.opacity = '0';
                        setTimeout(() => document.getElementById('orb-label').style.opacity = '1', 500);
                    } else {
                        this.maximizeDeck();
                    }
                });
            }

            bindNavigation() {
                const navBtns = document.querySelectorAll('.nav-btn');
                const indicator = document.getElementById('nav-indicator');
                const panels = document.querySelectorAll('.panel');

                const updateNav = (btn) => {
                    navBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    indicator.style.width = `${btn.offsetWidth}px`;
                    indicator.style.left = `${btn.offsetLeft}px`;

                    panels.forEach(p => p.classList.remove('active'));
                    document.getElementById(btn.dataset.target).classList.add('active');
                };

                navBtns.forEach(btn => btn.addEventListener('click', () => updateNav(btn)));
                setTimeout(() => updateNav(navBtns[0]), 50);
            }

            bindAudioControls() {
                const waveBtns = document.querySelectorAll('.wave-btn');
                waveBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        waveBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        State.beat = parseFloat(btn.dataset.freq);
                        Visual.updateThemeColor(btn.dataset.color);
                        Audio.update();
                    });
                });

                const sCarrier = document.getElementById('slide-carrier');
                const vCarrier = document.getElementById('val-carrier');
                sCarrier.addEventListener('input', (e) => {
                    State.carrier = parseFloat(e.target.value);
                    vCarrier.innerText = `${State.carrier.toFixed(1)} Hz`;
                    Audio.update();
                });

                document.getElementById('slide-volume').addEventListener('input', (e) => {
                    Audio.setVolume(parseFloat(e.target.value) / 100);
                });
            }

            bindPranaControls() {
                const pranaBtns = document.querySelectorAll('.prana-btn');
                pranaBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        pranaBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        State.pranaPattern = btn.dataset.pattern.split(',').map(Number);
                        
                        if (State.isRunning) {
                            Prana.toggle(false);
                            setTimeout(() => Prana.toggle(true), 50);
                        }
                    });
                });
            }

            bindVisualControls() {
                document.getElementById('slide-complexity').addEventListener('input', (e) => {
                    State.complexity = parseInt(e.target.value);
                });
                document.getElementById('slide-velocity').addEventListener('input', (e) => {
                    State.velocity = parseInt(e.target.value) / 1000;
                });
            }

            bindFocusControls() {
                document.getElementById('btn-new-coord').addEventListener('click', this.generateCoordinate);

                const timeBtns = document.querySelectorAll('.time-btn');
                timeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        timeBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.setTimer(parseInt(btn.dataset.time));
                    });
                });

                document.getElementById('btn-share').addEventListener('click', async () => {
                    try {
                        if (navigator.share) await navigator.share({ title: 'Aetheria', text: 'Enter the Loom.', url: window.location.href });
                        else {
                            const tmp = document.createElement('input');
                            document.body.appendChild(tmp);
                            tmp.value = window.location.href; tmp.select();
                            document.execCommand('copy'); document.body.removeChild(tmp);
                            alert("Link copied to clipboard");
                        }
                    } catch (err) {}
                });
            }

            generateCoordinate() {
                const r = () => Math.floor(1000 + Math.random() * 9000);
                document.getElementById('coord-display').innerText = `RV: ${r()}-${r()}`;
            }

            setTimer(minutes) {
                clearInterval(State.timerInterval);
                const display = document.getElementById('timer-display');
                
                if (minutes === 0) {
                    display.innerText = '--:--';
                    return;
                }

                State.sessionTimeRemaining = minutes * 60;
                const m = Math.floor(State.sessionTimeRemaining / 60).toString().padStart(2, '0');
                const s = (State.sessionTimeRemaining % 60).toString().padStart(2, '0');
                display.innerText = `${m}:${s}`;
                
                State.timerInterval = setInterval(() => {
                    if (!State.isRunning) return; 

                    State.sessionTimeRemaining--;
                    const m = Math.floor(State.sessionTimeRemaining / 60).toString().padStart(2, '0');
                    const s = (State.sessionTimeRemaining % 60).toString().padStart(2, '0');
                    display.innerText = `${m}:${s}`;

                    if (State.sessionTimeRemaining <= 0) {
                        clearInterval(State.timerInterval);
                        display.innerText = "DONE";
                        
                        State.isRunning = false;
                        Audio.toggle(false);
                        Prana.toggle(false);
                        this.maximizeDeck();
                    }
                }, 1000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const ui = new EngineUI();
            ui.init();
        });
    </script>
</body>
